*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #6FA8DC;
  --gold: #E8D76A;
  --gold-dim: rgba(232,215,106,0.55);
  --dark: #2a1a0e;
  --cell-bg: rgba(232,215,106,0.07);
  --cell-chk: rgba(232,215,106,0.18);
  --free-bg: #E8D76A;
}

html, body {
  height: 100%;
  background: var(--blue);
  overscroll-behavior: none;
}

body {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  color: var(--gold);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100dvh;
  padding: max(env(safe-area-inset-top), 14px) max(env(safe-area-inset-right), 16px) max(env(safe-area-inset-bottom), 24px) max(env(safe-area-inset-left), 16px);
  -webkit-tap-highlight-color: transparent;
}

.page {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  gap: 0;
}

/* TOP ROW */
.top-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}

.date {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  color: var(--gold);
  font-weight: 600;
  line-height: 1;
}

.kiss-run {
  text-align: right;
}
.logo-top-right {
  height: 72px;
  width: auto;
  display: block;
}
.logo-bottom {
  height: 52px;
  width: auto;
  display: block;
}
.logo-free {
  height: 28px;
  width: auto;
  display: block;
  flex-shrink: 0;
}

/* INFO BAR */
.info-bar {
  border: 1.5px solid var(--gold);
  display: grid;
  grid-template-columns: 1fr 1.8fr;
  margin-bottom: 10px;
}

.name-col {
  border-right: 1.5px solid var(--gold);
  padding: 7px 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.name-label {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.16em;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 700;
}
.name-input {
  border: none;
  border-bottom: 1px solid var(--gold-dim);
  background: transparent;
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.78rem;
  color: var(--gold);
  outline: none;
  width: 100%;
  padding: 2px 0;
  letter-spacing: 0.06em;
}
.name-input::placeholder { color: var(--gold-dim); }

.how-col { padding: 7px 8px; }
.how-title {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 3px;
}
.how-body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.72rem;
  line-height: 1.55;
  color: var(--gold);
  font-weight: 400;
}

/* BINGO TITLE */
.bingo-title {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-size: clamp(1.6rem, 8vw, 2.8rem);
  text-align: center;
  letter-spacing: 0.18em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 8px;
  flex-shrink: 0;
  line-height: 1;
}

/* GRID */
.grid-wrap {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: stretch;
  position: relative;
}

.grid {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  grid-template-rows: repeat(5, minmax(0, 1fr));
  border-left: 1.5px solid var(--gold);
  border-top: 1.5px solid var(--gold);
  position: relative;
}

.cell {
  border-right: 1.5px solid var(--gold);
  border-bottom: 1.5px solid var(--gold);
  padding: 3px 2px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  cursor: pointer;
  background: var(--cell-bg);
  transition: background 0.12s;
  position: relative;
  user-select: none;
  overflow: hidden;
  -webkit-tap-highlight-color: rgba(232,215,106,0.12);
}
.cell:active { background: rgba(232,215,106,0.22); }

.ct {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: clamp(0.5rem, 2.2vw, 0.68rem);
  font-weight: 500;
  letter-spacing: 0.01em;
  line-height: 1.35;
  text-transform: none;
  color: var(--gold);
  word-break: break-word;
  width: 100%;
}

.names-list {
  display: flex;
  flex-wrap: wrap;
  gap: 1px;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}
.name-tag {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-size: clamp(0.3rem, 1.1vw, 0.38rem);
  font-weight: 600;
  background: var(--gold);
  color: #2a1a0e;
  padding: 1px 3px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.cell.chk { background: var(--cell-chk); }
.cell.chk .ct { color: rgba(232,215,106,0.5); }

.free-cell {
  cursor: default;
  background: var(--free-bg) !important;
}
.free-cell:active { background: var(--free-bg) !important; }
.free-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.free-label {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-size: clamp(0.85rem, 3.5vw, 1.2rem);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--blue);
  font-weight: 700;
}

/* SVG strike overlay */
.strike-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 20;
  overflow: visible;
}

/* BOTTOM */
.bottom-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  flex-shrink: 0;
}



/* MODAL — using in-flow wrapper trick so iframe doesn't collapse */
.modal-wrap {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(42,26,18,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px 16px;
}
.modal-wrap.open { display: flex; }

.modal {
  background: var(--blue);
  border: 2px solid var(--gold);
  padding: 20px 16px 16px;
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 80dvh;
  overflow-y: auto;
}
.modal-title {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-size: 1rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 700;
}
.modal-prompt {
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  line-height: 1.55;
  color: var(--gold);
  opacity: 0.8;
}
.modal-names {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  min-height: 14px;
}
.modal-name-tag {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  background: var(--gold);
  color: #2a1a0e;
  padding: 4px 8px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  border-radius: 0;
}
.modal-hint {
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.5rem;
  color: var(--gold-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.modal-input {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-size: 1rem;
  border: 1.5px solid var(--gold);
  background: transparent;
  padding: 10px 10px;
  color: var(--gold);
  outline: none;
  width: 100%;
  border-radius: 0;
  -webkit-appearance: none;
  letter-spacing: 0.06em;
}
.modal-input::placeholder { color: var(--gold-dim); }
.modal-input:focus { border-color: var(--gold); }
.modal-actions {
  display: flex;
  gap: 8px;
}
.btn {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-weight: 700;
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1.5px solid var(--gold);
  padding: 11px 12px;
  cursor: pointer;
  flex: 1;
  border-radius: 0;
  -webkit-appearance: none;
  transition: background 0.1s, color 0.1s;
}
.btn-primary { background: var(--gold); color: #2a1a0e; }
.btn-primary:active { background: #fff; border-color: #fff; }
.btn-cancel { background: transparent; color: var(--gold); }
.btn-cancel:active { background: rgba(232,215,106,0.15); }

/* SUBMIT BUTTON */
.submit-wrap {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.btn-submit {
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border: 1.5px solid var(--gold);
  padding: 12px 28px;
  cursor: pointer;
  border-radius: 0;
  -webkit-appearance: none;
  background: var(--gold);
  color: #2a1a0e;
  transition: background 0.1s, color 0.1s;
}
.btn-submit:active { background: #fff; border-color: #fff; }
.submit-status {
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.5rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-dim);
  min-height: 14px;
  text-align: center;
}

/* BINGO TOAST */
.bingo-toast {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #2a1a0e;
  color: var(--gold);
  font-family: 'SaintRegus', 'Arial Narrow', Arial, sans-serif;
  font-size: 1.8rem;
  letter-spacing: 0.2em;
  padding: 12px 28px;
  border: 2.5px solid var(--gold);
  z-index: 300;
  transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.4s;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
  text-transform: uppercase;
}
.bingo-toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
</style>
</head>
<body>

<div class="page">
  <div class="top-row">
    <div class="date">4月 &nbsp;26日</div>
    <div class="kiss-run">
      <img src="top right logo.svg" alt="" class="logo-top-right">
    </div>
  </div>

  <div class="info-bar">
    <div class="name-col">
      <span class="name-label">NAME:</span>
      <input class="name-input" type="text" placeholder="your name" autocomplete="off" autocorrect="off" autocapitalize="words">
    </div>
    <div class="how-col">
      <div class="how-title">HOW TO PLAY HUMAN BINGO</div>
      <div class="how-body">Mingle with new people and check off each square when you find someone who matches the description.</div>
    </div>
  </div>

  <div class="bingo-title">BINGO CARD</div>

  <div class="grid-wrap">
    <div class="grid" id="grid">
      <svg class="strike-svg" id="strikeSvg"></svg>
    </div>
  </div>

  <div class="bottom-section">
    <img src="under bingo logo.svg" alt="" class="logo-bottom">
  </div>

  <div class="submit-wrap">
    <button class="btn-submit" id="btnSubmit">SUBMIT MY CARD</button>
    <div class="submit-status" id="submitStatus"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-wrap" id="modalWrap">
  <div class="modal">
    <div class="modal-title" id="modalTitle">CHECK OFF</div>
    <div class="modal-prompt" id="modalPrompt"></div>
    <div class="modal-names" id="modalNames"></div>
    <span class="modal-hint" id="modalHint"></span>
    <input class="modal-input" id="modalInput" type="text" placeholder="Name of person you met…" maxlength="40" autocomplete="off" autocorrect="off" autocapitalize="words">
    <div class="modal-actions">
      <button class="btn btn-cancel" id="btnCancel">Cancel</button>
      <button class="btn btn-primary" id="btnConfirm">Check Off ✓</button>
    </div>
  </div>
</div>

<div class="bingo-toast" id="bingoToast">BINGO!</div>

<script>
const PROMPTS=[
  "Speaks at least 4 languages",
  "Took the JLPT N2 and failed",
  "Ran 5km today",
  "Went to Ishikawa Zoo and saw Punch the monkey",
  "Does not know how to ride a bicycle",
  "Been to all 47 prefectures in Japan",
  "Has 5 or more tattoos",
  "Has summited Mt Fuji",
  "Been to a music festival in Japan",
  "Has ran the Tokyo Marathon",
  "Blacked out in Shibuya",
  "Got Nampa'd in Shinjuku",
  "Been to 2+ KissaHaus events",
  "Above lvl 60 in Pokemon Go",
  "Used to play / is in a band",
  "50+ day streak in Duolingo",
  "Have been stabbed",
  "Dealt with police in Japan",
  "Can deadlift at least 100kg",
  "Fell in a train platform gap",
  "Got stood up on a date",
  "Finished 3+ books this year",
  "Less than 5 hrs screen time",
  "Works in the creative industry"
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

let squares=[], state=[], activeIdx=null, lastBingoCount=0;
const lineGroups={};
const grid=document.getElementById('grid');
const svg=document.getElementById('strikeSvg');

function buildGrid(){
  const sh=shuffle(PROMPTS);
  squares=[...sh.slice(0,12),null,...sh.slice(12)];
  state=Array.from({length:25},(_,i)=>({checked:i===12,names:[]}));
  grid.querySelectorAll('.cell').forEach(c=>c.remove());
  svg.innerHTML='';
  Object.keys(lineGroups).forEach(k=>delete lineGroups[k]);
  lastBingoCount=0;

  squares.forEach((text,i)=>{
    const cell=document.createElement('div');
    cell.className='cell'+(i===12?' free-cell':'');

    if(i===12){
      const inner=document.createElement('div');
      inner.className='free-inner';
      const lbl=document.createElement('div');
      lbl.className='free-label';
      lbl.textContent='FREE SPACE';
      inner.appendChild(lbl);
      cell.appendChild(inner);
    } else {
      const ct=document.createElement('div');
      ct.className='ct';
      ct.innerHTML=text.replace(/\n/g,'<br>');
      const nl=document.createElement('div');
      nl.className='names-list';
      cell.appendChild(ct);cell.appendChild(nl);
      cell.addEventListener('click',()=>openModal(i));
    }
    grid.insertBefore(cell,svg);
  });
  renderCells();
}

function getCells(){return grid.querySelectorAll('.cell');}

function renderCells(){
  const cells=[...getCells()];
  cells.forEach((cell,i)=>{
    if(i===12)return;
    const s=state[i];
    cell.classList.toggle('chk',s.checked);
    const nl=cell.querySelector('.names-list');
    if(!nl)return;
    nl.innerHTML='';
    s.names.forEach(n=>{
      const t=document.createElement('span');
      t.className='name-tag';t.textContent=n;nl.appendChild(t);
    });
  });
  renderStrikes();
}

function getLines(){
  const L=[];
  for(let r=0;r<5;r++) L.push([r*5,r*5+1,r*5+2,r*5+3,r*5+4]);
  for(let c=0;c<5;c++) L.push([c,c+5,c+10,c+15,c+20]);
  L.push([0,6,12,18,24]);L.push([4,8,12,16,20]);
  return L;
}
function isComplete(idxArr){return idxArr.every(i=>state[i].checked);}

function renderStrikes(){
  const cells=[...getCells()];
  const gr=grid.getBoundingClientRect();
  getLines().forEach((idxArr,li)=>{
    const complete=isComplete(idxArr);
    if(complete&&!lineGroups[li]){
      const f=cells[idxArr[0]].getBoundingClientRect();
      const la=cells[idxArr[idxArr.length-1]].getBoundingClientRect();
      const x1=f.left-gr.left+f.width*0.1;
      const y1=f.top-gr.top+f.height*0.5;
      const x2=la.left-gr.left+la.width*0.9;
      const y2=la.top-gr.top+la.height*0.5;
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',x1);line.setAttribute('y1',y1);
      line.setAttribute('x2',x2);line.setAttribute('y2',y2);
      line.setAttribute('stroke','#E8D76A');line.setAttribute('stroke-width','2.5');
      line.setAttribute('stroke-linecap','round');
      const len=Math.sqrt((x2-x1)**2+(y2-y1)**2);
      line.style.cssText=`stroke-dasharray:${len};stroke-dashoffset:${len};transition:stroke-dashoffset .5s cubic-bezier(.4,0,.2,1)`;
      g.appendChild(line);svg.appendChild(g);lineGroups[li]=g;
      setTimeout(()=>{line.style.strokeDashoffset=0;},30);
    } else if(!complete&&lineGroups[li]){
      svg.removeChild(lineGroups[li]);delete lineGroups[li];
    }
  });
}

function checkBingo(){
  const n=getLines().filter(l=>isComplete(l)).length;
  if(n>lastBingoCount){showToast();lastBingoCount=n;}
}

let toastTimeout;
function showToast(){
  clearTimeout(toastTimeout);
  const t=document.getElementById('bingoToast');
  t.classList.add('show');
  toastTimeout=setTimeout(()=>t.classList.remove('show'),3000);
}

const modalWrap=document.getElementById('modalWrap');
const modalTitle=document.getElementById('modalTitle');
const modalPrompt=document.getElementById('modalPrompt');
const modalNames=document.getElementById('modalNames');
const modalHint=document.getElementById('modalHint');
const modalInput=document.getElementById('modalInput');

function openModal(i){
  activeIdx=i;
  const s=state[i];
  modalTitle.textContent=s.checked?'CHECKED ✓':'CHECK OFF';
  modalPrompt.innerHTML=squares[i].replace(/\n/g,'<br>');
  modalInput.value='';
  renderModalNames();
  modalHint.textContent=s.names.length>0?'Tap a name to remove':'';
  modalWrap.classList.add('open');
  setTimeout(()=>modalInput.focus(),120);
}

function renderModalNames(){
  const s=state[activeIdx];
  modalNames.innerHTML='';
  s.names.forEach((n,ni)=>{
    const t=document.createElement('button');
    t.className='modal-name-tag';t.textContent=n;
    t.addEventListener('click',()=>{
      s.names.splice(ni,1);
      if(!s.names.length) s.checked=false;
      renderModalNames();
      modalHint.textContent=s.names.length>0?'Tap a name to remove':'';
      renderCells();
    });
    modalNames.appendChild(t);
  });
}

function closeModal(){modalWrap.classList.remove('open');activeIdx=null;modalInput.blur();}

document.getElementById('btnCancel').addEventListener('click',closeModal);
modalWrap.addEventListener('click',e=>{if(e.target===modalWrap)closeModal();});
modalInput.addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('btnConfirm').click();
  if(e.key==='Escape')closeModal();
});
document.getElementById('btnConfirm').addEventListener('click',()=>{
  if(activeIdx===null)return;
  const name=modalInput.value.trim();
  const s=state[activeIdx];
  if(name){
    s.names.push(name);
    s.checked=true;
    modalInput.value='';
    renderModalNames();
    modalHint.textContent='Tap a name to remove';
    renderCells();
    checkBingo();
  }
  if(!name) closeModal();
});


window.addEventListener('resize',()=>{
  Object.keys(lineGroups).forEach(li=>{
    if(lineGroups[li]) svg.removeChild(lineGroups[li]);
    delete lineGroups[li];
  });
  renderStrikes();
});

// ── SUBMIT ──────────────────────────────────────────────
const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

document.getElementById('btnSubmit').addEventListener('click', async () => {
  const playerName = document.querySelector('.name-input').value.trim();
  if (!playerName) {
    document.getElementById('submitStatus').textContent = 'Please enter your name first!';
    return;
  }

  const checkedSquares = [];
  squares.forEach((text, i) => {
    if (i === 12) return; // skip free space
    const s = state[i];
    if (s.checked) {
      checkedSquares.push({
        square: text,
        names: s.names
      });
    }
  });

  const payload = {
    playerName,
    checkedCount: checkedSquares.length,
    squares: checkedSquares,
    submittedAt: new Date().toISOString()
  };

  const statusEl = document.getElementById('submitStatus');
  const btn = document.getElementById('btnSubmit');
  statusEl.textContent = 'Sending...';
  btn.disabled = true;

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    statusEl.textContent = '✓ Card submitted! Thanks for playing.';
    btn.textContent = 'SUBMITTED ✓';
    btn.style.background = 'transparent';
    btn.style.color = 'var(--gold)';
  } catch (err) {
    statusEl.textContent = 'Something went wrong. Try again.';
    btn.disabled = false;
  }
});

buildGrid();
</script>
</body>
</html>
